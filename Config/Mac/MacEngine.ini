; Mac-only overrides — disables VR features in the Mac editor.
; The Meta XR plugin doesn't support Mac (PlatformAllowList: Win64, Android only),
; so trying to instantiate VR Preview here crashes the Metal RHI.
; Android target inherits the project-wide settings (which are correct), this only
; overrides for the editor running on macOS.

[/Script/Engine.RendererSettings]
r.ForwardShading=False
vr.InstancedStereo=False
vr.MobileMultiView=False
